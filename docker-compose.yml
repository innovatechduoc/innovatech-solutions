version: "3.8"
services:
  mongodb_innovatech:
    image: mongo:latest
    container_name: mongodb_local
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secretpassword
      MONGO_INITDB_DATABASE: innovatech_solutions
    volumes:
      - mongo_data:/data/db
volumes:
  mongo_data:
